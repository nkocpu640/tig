<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tipsters Hub</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.js"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;
    const {
      Trophy, Users, TrendingUp, CheckCircle2, XCircle, Copy, ChevronRight,
      ArrowLeft, Filter, Star, Flame, Globe, LayoutDashboard, Settings, X
    } = LucideReact;

    const CURATED_TIPSTERS = [
      {
        id: 't1', name: 'EaglesEye',
        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Felix',
        bio: 'World Cup specialist focused on African teams and underdog value.',
        accuracy: 78.5, winRate: 12.0, backs: 1450, topOdds: 45.2, rank: 1,
        recentTips: [
          { id: 'b1', code: 'WC-X92-J8', date: '2026-06-11', odds: 5.4, status: 'pending', legs: [
            { match: 'Qatar vs Ecuador', pick: 'Home Win', odds: 2.1, status: 'won' },
            { match: 'England vs Iran', pick: 'Over 2.5', odds: 1.8, status: 'pending' },
            { match: 'USA vs Wales', pick: 'Draw', odds: 3.2, status: 'pending' }
          ]},
          { id: 'b2', code: 'WC-A12-K9', date: '2026-06-10', odds: 12.8, status: 'lost', legs: [
            { match: 'Senegal vs Netherlands', pick: 'BTTS', odds: 1.9, status: 'won' },
            { match: 'Argentina vs Saudi Arabia', pick: 'Home -2', odds: 2.0, status: 'won' },
            { match: 'France vs Australia', pick: 'Mbappe to score 2+', odds: 4.5, status: 'lost' }
          ]}
        ]
      },
      {
        id: 't2', name: 'TacticalSam',
        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Sam',
        bio: 'Data-driven insights for the beautiful game.',
        accuracy: 82.1, winRate: 8.5, backs: 2100, topOdds: 15.4, rank: 2,
        recentTips: [
          { id: 'b3', code: 'WC-L99-M1', date: '2026-06-11', odds: 3.2, status: 'won', legs: [
            { match: 'Brazil vs Serbia', pick: 'Home Win', odds: 1.4, status: 'won' },
            { match: 'Portugal vs Ghana', pick: 'Home Win', odds: 1.5, status: 'won' },
            { match: 'Spain vs Costa Rica', pick: 'Home Win', odds: 1.2, status: 'won' }
          ]}
        ]
      },
      {
        id: 't3', name: 'TheOracle',
        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Oracle',
        bio: 'High stakes, high rewards. Multiples are my specialty.',
        accuracy: 65.4, winRate: 5.2, backs: 890, topOdds: 112.5, rank: 3, recentTips: []
      },
      { id: 't4', name: 'BetQueen', accuracy: 72.1, winRate: 15.0, backs: 3200, topOdds: 8.2, rank: 4, avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Queen', recentTips: [] },
      { id: 't5', name: 'CornerKing', accuracy: 89.4, winRate: 21.0, backs: 1100, topOdds: 4.5, rank: 5, avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=King', recentTips: [] },
    ];

    const BIG_WINS = [
      {
        id: 'w1', tipster: 'TheOracle', odds: 112.5, date: '2d ago', code: 'WC-MEGA-Z', amount: '₦2.5M',
        legs: [
          { match: 'Belgium vs Canada', pick: 'Draw', odds: 4.5, status: 'won' },
          { match: 'Morocco vs Croatia', pick: 'Morocco Win', odds: 5.0, status: 'won' },
          { match: 'Germany vs Japan', pick: 'Japan Win', odds: 5.0, status: 'won' }
        ]
      },
      {
        id: 'w2', tipster: 'EaglesEye', odds: 45.2, date: '1d ago', code: 'WC-FLY-HIGH', amount: '₦450k',
        legs: [
          { match: 'Cameroon vs Switzerland', pick: 'Cameroon Win', odds: 4.2, status: 'won' },
          { match: 'Uruguay vs S. Korea', pick: 'Draw', odds: 3.4, status: 'won' },
          { match: 'Portugal vs Ghana', pick: 'Over 3.5 Goals', odds: 3.1, status: 'won' }
        ]
      },
    ];

    const Badge = ({ children, color = "green" }) => {
      const colors = {
        green: "bg-green-500/10 text-green-400 border-green-500/20",
        gold: "bg-yellow-500/10 text-yellow-400 border-yellow-500/20",
        blue: "bg-blue-500/10 text-blue-400 border-blue-500/20",
        red: "bg-red-500/10 text-red-400 border-red-500/20",
      };
      return (
        <span className={`px-2 py-0.5 rounded-full text-[10px] font-black border uppercase tracking-wider ${colors[color]}`}>
          {children}
        </span>
      );
    };

    const TipsterCard = ({ tipster, onClick }) => (
      <div onClick={() => onClick(tipster)} className="bg-zinc-900 rounded-2xl border border-zinc-800 p-4 shadow-xl hover:border-green-600/50 transition-all cursor-pointer group">
        <div className="flex items-center gap-4 mb-4">
          <div className="relative">
            <img src={tipster.avatar} alt={tipster.name} className="w-14 h-14 rounded-full bg-zinc-800 border-2 border-zinc-700 shadow-sm" />
            {tipster.rank <= 3 && (
              <div className="absolute -top-1 -right-1 bg-yellow-500 rounded-full p-1 text-black shadow-sm">
                <Trophy size={12} strokeWidth={3} />
              </div>
            )}
          </div>
          <div className="flex-1">
            <h3 className="font-bold text-white group-hover:text-green-500 transition-colors">{tipster.name}</h3>
          </div>
          <div className="text-right">
            <p className="text-[10px] font-black text-zinc-500 uppercase tracking-tighter">Leg Accuracy</p>
            <p className="text-lg font-black text-green-500 leading-tight">{tipster.accuracy}%</p>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-2 bg-black/40 rounded-xl p-3 mb-3 border border-zinc-800/50">
          <div>
            <p className="text-[9px] text-zinc-500 font-black uppercase tracking-widest">Backs</p>
            <div className="flex items-center gap-1 text-sm font-bold text-zinc-200">
              <Users size={12} className="text-blue-500" />
              {tipster.backs.toLocaleString()}
            </div>
          </div>
          <div>
            <p className="text-[9px] text-zinc-500 font-black uppercase tracking-widest">Peak Odds</p>
            <div className="flex items-center gap-1 text-sm font-bold text-zinc-200">
              <TrendingUp size={12} className="text-orange-500" />
              {tipster.topOdds}x
            </div>
          </div>
        </div>
        <button className="w-full flex items-center justify-center gap-2 py-2 text-xs font-black uppercase tracking-wider text-green-500 bg-green-500/5 rounded-lg border border-green-500/10 group-hover:bg-green-600 group-hover:text-white transition-all">
          Explore Tips <ChevronRight size={14} />
        </button>
      </div>
    );

    const CouponModal = ({ win, onClose }) => {
      if (!win) return null;
      return (
        <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center px-4 pb-0 md:pb-4">
          <div className="absolute inset-0 bg-black/80" onClick={onClose} />
          <div className="relative w-full max-w-[400px] bg-zinc-900 border border-zinc-800 rounded-t-[32px] md:rounded-[32px] overflow-hidden shadow-2xl">
            <div className="absolute top-4 right-4 z-10">
              <button onClick={onClose} className="p-2 bg-black/40 text-white rounded-full hover:bg-black/60 transition-colors">
                <X size={20} />
              </button>
            </div>
            <div className="p-6">
              <div className="flex items-center gap-3 mb-6">
                <div className="w-12 h-12 rounded-2xl bg-green-600 flex items-center justify-center text-white">
                  <Trophy size={24} />
                </div>
                <div>
                  <h3 className="text-xl font-black text-white leading-tight">Winning Coupon</h3>
                  <p className="text-xs font-bold text-zinc-500 uppercase tracking-widest">Result: {win.amount} Won</p>
                </div>
              </div>
              <div className="bg-black/40 rounded-2xl p-4 border border-zinc-800 mb-6">
                <div className="flex justify-between items-center mb-4 pb-4 border-b border-zinc-800/50">
                  <div>
                    <span className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block">Booking Code</span>
                    <span className="text-xl font-black text-white tracking-widest">{win.code}</span>
                  </div>
                  <div className="text-right">
                    <span className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block">Total Odds</span>
                    <span className="text-xl font-black text-green-500">{win.odds}x</span>
                  </div>
                </div>
                <div className="space-y-4">
                  {win.legs.map((leg, idx) => (
                    <div key={idx} className="flex justify-between items-center gap-4">
                      <div className="flex items-start gap-3 flex-1">
                        <CheckCircle2 size={16} className="text-green-500 mt-1 flex-shrink-0" />
                        <div>
                          <p className="text-xs font-bold text-white leading-tight mb-0.5">{leg.match}</p>
                          <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">{leg.pick}</p>
                        </div>
                      </div>
                      <div className="text-right">
                        <p className="text-xs font-black text-green-500">{leg.odds}</p>
                        <p className="text-[8px] font-black text-green-500/50 uppercase">WON</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="flex gap-3">
                <button className="flex-1 py-4 bg-zinc-800 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-zinc-700 transition-all flex items-center justify-center gap-2">
                  <Copy size={14} /> COPY CODE
                </button>
                <button className="flex-1 py-4 bg-green-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-green-500 transition-all">
                  REUSE BET
                </button>
              </div>
              <p className="text-center text-[9px] font-bold text-zinc-600 mt-6 uppercase tracking-[0.2em]">Predicted by {win.tipster} • 2026 World Cup</p>
            </div>
          </div>
        </div>
      );
    };

    const BookingCodeCard = ({ tip }) => {
      const [copied, setCopied] = useState(false);
      const handleCopy = () => {
        navigator.clipboard.writeText(tip.code).catch(() => {});
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };
      return (
        <div className="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden shadow-2xl">
          <div className="bg-zinc-800/50 px-4 py-2 border-b border-zinc-800 flex justify-between items-center">
            <span className="text-[10px] font-black text-zinc-400 uppercase tracking-widest">WC-26 CODE</span>
            <Badge color={tip.status === 'won' ? 'green' : tip.status === 'lost' ? 'red' : 'blue'}>{tip.status}</Badge>
          </div>
          <div className="p-4">
            <div className="flex items-center justify-between mb-4">
              <div className="text-2xl font-black text-white tracking-widest">{tip.code}</div>
              <button onClick={handleCopy} className={`p-2 rounded-xl transition-all ${copied ? 'bg-green-600 text-white' : 'bg-zinc-800 text-zinc-400 hover:text-white border border-zinc-700'}`}>
                {copied ? <CheckCircle2 size={18} /> : <Copy size={18} />}
              </button>
            </div>
            <div className="space-y-3 mb-4">
              {tip.legs.map((leg, idx) => (
                <div key={idx} className="flex items-center justify-between text-xs p-2 bg-black/20 rounded-lg border border-zinc-800/50">
                  <div className="flex items-center gap-3">
                    {leg.status === 'won' ? <CheckCircle2 size={14} className="text-green-500" /> :
                     leg.status === 'lost' ? <XCircle size={14} className="text-red-500" /> :
                     <div className="w-3.5 h-3.5 rounded-full border-2 border-zinc-600" />}
                    <div className="flex flex-col">
                      <span className="font-bold text-zinc-100">{leg.match}</span>
                      <span className="text-[9px] text-zinc-500 uppercase font-black">{leg.pick}</span>
                    </div>
                  </div>
                  <span className="font-black text-green-500">{leg.odds}</span>
                </div>
              ))}
            </div>
            <div className="pt-4 border-t border-zinc-800 flex justify-between items-center">
              <div className="flex flex-col">
                <span className="text-[9px] font-black text-zinc-500 uppercase tracking-widest">Total Odds</span>
                <span className="text-lg font-black text-white leading-none">{tip.odds}x</span>
              </div>
              <button className="px-6 py-2 bg-green-600 text-white rounded-xl text-xs font-black uppercase tracking-wider hover:bg-green-500 transition-all">
                ADD TO SLIP
              </button>
            </div>
          </div>
        </div>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('hub');
      const [selectedTipster, setSelectedTipster] = useState(null);
      const [selectedWin, setSelectedWin] = useState(null);

      const leaderboardData = useMemo(() => {
        return [...CURATED_TIPSTERS].sort((a, b) => {
          const scoreA = (a.accuracy * 0.6) + (a.backs / 100 * 0.3) + (a.winRate * 0.1);
          const scoreB = (b.accuracy * 0.6) + (b.backs / 100 * 0.3) + (b.winRate * 0.1);
          return scoreB - scoreA;
        });
      }, []);

      const renderHub = () => (
        <div>
          <section className="mb-6">
            <div className="bg-gradient-to-br from-green-800 to-black rounded-3xl p-6 text-white mb-6 relative border border-green-900/30 overflow-hidden">
              <div className="relative z-10">
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-2 h-2 bg-green-500 rounded-full"></div>
                  <span className="text-[9px] font-black uppercase tracking-[0.3em] text-green-400">WC-26 EXPERTS</span>
                </div>
                <h1 className="text-3xl font-black mb-1 leading-[0.9] tracking-tighter">THE HUB</h1>
                <p className="text-green-100/60 text-xs mb-4 max-w-[200px]">Unlock verified strategies from our curated squad.</p>
                <Badge color="gold">Leg Accuracy Focus</Badge>
              </div>
              <div className="absolute right-[-20px] top-0 opacity-10">
                <Trophy size={180} strokeWidth={1} />
              </div>
            </div>
          </section>

          <section className="mb-8">
            <div className="flex items-center justify-between mb-4 px-2">
              <h2 className="text-xs font-black text-zinc-400 uppercase tracking-widest flex items-center gap-2">
                <Flame size={14} className="text-orange-500" /> Legend Wins
              </h2>
            </div>
            <div className="flex gap-4 overflow-x-auto pb-4 px-1 -mx-1 scrollbar-hide">
              {BIG_WINS.map(win => (
                <div key={win.id} className="min-w-[220px] bg-zinc-900 border border-zinc-800 rounded-2xl p-4 shadow-xl flex flex-col">
                  <div className="flex justify-between items-start mb-1">
                    <span className="text-[9px] font-black text-green-500 uppercase tracking-wider">{win.tipster}</span>
                    <span className="text-[9px] text-zinc-600 font-bold uppercase">{win.date}</span>
                  </div>
                  <div className="text-2xl font-black text-white">{win.odds}x</div>
                  <div className="text-xs font-bold text-zinc-400 mb-3">{win.amount}</div>
                  <div className="mt-auto space-y-2">
                    <div className="flex items-center justify-between text-[10px] bg-black/50 px-3 py-2 rounded-xl border border-zinc-800">
                      <span className="font-mono text-zinc-400">{win.code}</span>
                      <Copy size={12} className="text-zinc-600" />
                    </div>
                    <button onClick={() => setSelectedWin(win)} className="w-full py-2 bg-zinc-800 text-white border border-zinc-700 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-zinc-700 transition-all">
                      View Coupon
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </section>

          <section className="mb-20">
            <div className="flex items-center justify-between mb-4 px-2">
              <h2 className="text-xs font-black text-zinc-400 uppercase tracking-widest">Expert Squad</h2>
              <Filter size={14} className="text-zinc-600" />
            </div>
            <div className="grid grid-cols-1 gap-4">
              {CURATED_TIPSTERS.map(tipster => (
                <TipsterCard key={tipster.id} tipster={tipster} onClick={setSelectedTipster} />
              ))}
            </div>
          </section>
        </div>
      );

      const renderLeaderboard = () => (
        <div className="pb-24">
          <div className="bg-zinc-900 rounded-3xl border border-zinc-800 overflow-hidden shadow-2xl">
            <div className="p-6 bg-zinc-800/30 border-b border-zinc-800">
              <h2 className="text-xl font-black text-white mb-1">LEAGUE TABLE</h2>
              <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest italic">Weighted Leg-Accuracy Scoring</p>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead className="bg-black/20 text-zinc-600 text-[9px] font-black uppercase tracking-[0.2em] border-b border-zinc-800">
                  <tr>
                    <th className="px-4 py-4 text-left">#</th>
                    <th className="px-4 py-4 text-left">MEMBER</th>
                    <th className="px-4 py-4 text-center">ACC%</th>
                    <th className="px-4 py-4 text-right">SCORE</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-zinc-800/50">
                  {leaderboardData.map((t, idx) => (
                    <tr key={t.id} className="hover:bg-green-500/5 cursor-pointer transition-colors" onClick={() => setSelectedTipster(t)}>
                      <td className="px-4 py-5 text-zinc-500 font-black text-xs">{idx + 1}</td>
                      <td className="px-4 py-5">
                        <div className="flex items-center gap-2">
                          <img src={t.avatar} className="w-8 h-8 rounded-full bg-zinc-800 border border-zinc-700" />
                          <div className="text-xs font-black text-white">{t.name}</div>
                        </div>
                      </td>
                      <td className="px-4 py-5 text-center">
                        <span className="text-xs font-black text-green-500">{t.accuracy}%</span>
                      </td>
                      <td className="px-4 py-5 text-right">
                        <Badge color={idx < 3 ? "gold" : "blue"}>
                          {((t.accuracy * 0.6) + (t.backs/100 * 0.3) + (t.winRate * 0.1)).toFixed(1)}
                        </Badge>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );

      const renderTipsterProfile = (tipster) => (
        <div className="pb-24">
          <button onClick={() => setSelectedTipster(null)} className="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-6 hover:text-green-500 transition-colors">
            <ArrowLeft size={14} /> Back to Hub
          </button>
          <div className="bg-zinc-900 rounded-3xl border border-zinc-800 p-6 shadow-2xl mb-6">
            <div className="flex flex-col items-center text-center mb-6">
              <div className="relative mb-4">
                <img src={tipster.avatar} className="w-24 h-24 rounded-3xl bg-zinc-800 shadow-md border-4 border-zinc-900" />
                <div className="absolute -bottom-2 right-1/2 translate-x-1/2 bg-green-600 text-white rounded-lg px-3 py-1 text-[8px] font-black uppercase tracking-widest shadow-xl">
                  VERIFIED
                </div>
              </div>
              <h1 className="text-2xl font-black text-white mb-2 leading-none mt-2">{tipster.name}</h1>
              {tipster.bio && <p className="text-zinc-400 text-xs text-center leading-relaxed italic max-w-[240px]">"{tipster.bio}"</p>}
            </div>
            <div className="grid grid-cols-2 gap-3 mb-6">
              <div className="bg-black/40 border border-zinc-800 rounded-2xl p-4 text-center">
                <p className="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-1">LEG ACCURACY</p>
                <p className="text-2xl font-black text-green-500">{tipster.accuracy}%</p>
              </div>
              <div className="bg-black/40 border border-zinc-800 rounded-2xl p-4 text-center">
                <p className="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-1">POPULARITY</p>
                <p className="text-2xl font-black text-white">{tipster.backs.toLocaleString()}</p>
              </div>
            </div>
            <div className="bg-green-600/5 border border-green-600/20 rounded-2xl p-4 text-center">
              <p className="text-[9px] font-black text-green-500 uppercase tracking-widest mb-2">CURRENT FORM</p>
              <div className="flex justify-center gap-1">
                {[1,1,1,0,1].map((res, i) => (
                  <div key={i} className={`w-2 h-2 rounded-full ${res === 1 ? 'bg-green-500' : 'bg-red-500 opacity-30'}`} />
                ))}
              </div>
            </div>
          </div>
          <div className="space-y-4">
            <h2 className="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em] mb-4 px-2">Active Predictions</h2>
            {tipster.recentTips && tipster.recentTips.length > 0 ? (
              tipster.recentTips.map(tip => <BookingCodeCard key={tip.id} tip={tip} />)
            ) : (
              <div className="bg-zinc-900/50 rounded-3xl p-10 text-center border-2 border-dashed border-zinc-800">
                <p className="text-zinc-600 text-xs font-black uppercase tracking-widest italic">Analyzing Matches...</p>
              </div>
            )}
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-zinc-950 flex justify-center p-0 md:p-8 font-sans antialiased">
          <div className="w-full max-w-[430px] min-h-screen md:min-h-[850px] bg-black md:rounded-[40px] md:border-[8px] md:border-zinc-800 shadow-2xl overflow-hidden flex flex-col relative overflow-y-auto no-scrollbar">
            <header className="sticky top-0 z-50 bg-black/90 backdrop-blur-xl border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="bg-green-600 px-2 py-0.5 rounded text-[10px] text-white font-black italic tracking-tighter">B9ja</div>
                <div className="w-[1px] h-4 bg-zinc-800 mx-1" />
                <h1 className="text-xs font-black uppercase tracking-[0.2em] text-white">HUB</h1>
              </div>
              <div className="flex items-center gap-3">
                <div className="flex flex-col items-end">
                  <span className="text-[8px] font-black text-zinc-500 uppercase">Balance</span>
                  <span className="text-xs font-black text-green-500 leading-none">₦25,450</span>
                </div>
                <div className="w-8 h-8 rounded-full bg-zinc-800 border border-zinc-700 flex items-center justify-center">
                  <Users size={14} className="text-zinc-400" />
                </div>
              </div>
            </header>

            <main className="flex-1 px-5 pt-6 relative">
              {!selectedTipster && (
                <div className="flex gap-1 bg-zinc-900 p-1 rounded-2xl w-fit mb-6 border border-zinc-800 mx-auto">
                  <button onClick={() => setActiveTab('hub')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'hub' ? 'bg-zinc-800 text-green-500' : 'text-zinc-600'}`}>
                    The Hub
                  </button>
                  <button onClick={() => setActiveTab('leaderboard')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'leaderboard' ? 'bg-zinc-800 text-green-500' : 'text-zinc-600'}`}>
                    Leagues
                  </button>
                </div>
              )}
              {selectedTipster ? renderTipsterProfile(selectedTipster) : (activeTab === 'hub' ? renderHub() : renderLeaderboard())}
              <CouponModal win={selectedWin} onClose={() => setSelectedWin(null)} />
            </main>

            <nav className="sticky bottom-0 w-full bg-black/95 backdrop-blur-xl border-t border-zinc-800 px-6 py-4 flex justify-between items-center z-50">
              <button onClick={() => { setSelectedTipster(null); setActiveTab('hub'); setSelectedWin(null); }} className={`flex flex-col items-center gap-1 ${activeTab === 'hub' && !selectedTipster ? 'text-green-500' : 'text-zinc-600'}`}>
                <LayoutDashboard size={18} />
                <span className="text-[8px] font-black uppercase tracking-widest">Home</span>
              </button>
              <button className="flex flex-col items-center gap-1 text-zinc-600">
                <Globe size={18} />
                <span className="text-[8px] font-black uppercase tracking-widest">Live</span>
              </button>
              <button onClick={() => { setSelectedTipster(null); setActiveTab('leaderboard'); setSelectedWin(null); }} className={`flex flex-col items-center gap-1 ${activeTab === 'leaderboard' ? 'text-green-500' : 'text-zinc-600'}`}>
                <Trophy size={18} />
                <span className="text-[8px] font-black uppercase tracking-widest">Ranks</span>
              </button>
              <button className="flex flex-col items-center gap-1 text-zinc-600">
                <Star size={18} />
                <span className="text-[8px] font-black uppercase tracking-widest">Wins</span>
              </button>
              <button className="flex flex-col items-center gap-1 text-zinc-600">
                <Settings size={18} />
                <span className="text-[8px] font-black uppercase tracking-widest">Profile</span>
              </button>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
